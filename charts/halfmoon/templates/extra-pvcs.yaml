{{- range .Values.extraVolumeClaims }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "halfmoon.fullname" $ }}-{{ .name }}
  labels:
    {{- include "halfmoon.labels" $ | nindent 4 }}
spec:
  accessModes:
    {{- toYaml .accessModes | nindent 4 }}
  {{- if .storageClassName }}
  storageClassName: {{ .storageClassName | quote }}
  {{- end }}
  resources:
    {{- toYaml .resources | nindent 4 }}
{{- end }}
