suite: ServiceAccount
templates:
  - templates/serviceaccount.yaml
values:
  - ../values.yaml
set:
  config.agents.defaults.model_name: "test-model"
tests:
  - it: should render a ServiceAccount by default
    asserts:
      - isKind:
          of: ServiceAccount

  - it: should not render when create is false
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should use fullname by default
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-halfmoon

  - it: should use custom name when set
    set:
      serviceAccount.name: custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: custom-sa

  - it: should set annotations when provided
    set:
      serviceAccount.annotations:
        eks.amazonaws.com/role-arn: "arn:aws:iam::role/halfmoon"
    asserts:
      - isNotNull:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]

  - it: should have standard labels
    asserts:
      - isNotNull:
          path: metadata.labels["app.kubernetes.io/name"]
      - isNotNull:
          path: metadata.labels["helm.sh/chart"]
