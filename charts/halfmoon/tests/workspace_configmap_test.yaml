suite: Workspace ConfigMap
templates:
  - templates/workspace-configmap.yaml
values:
  - ../values.yaml
set:
  config.agents.defaults.model_name: "test-model"
tests:
  - it: should not render when no workspace files are defined
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when root workspace files are defined
    values:
      - values/workspace-root.yaml
    asserts:
      - isKind:
          of: ConfigMap

  - it: should render when agent workspace files are defined
    values:
      - values/workspace-agent.yaml
    asserts:
      - isKind:
          of: ConfigMap

  - it: should use correct name suffix
    values:
      - values/workspace-root.yaml
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-halfmoon-workspace

  - it: should have standard labels
    values:
      - values/workspace-root.yaml
    asserts:
      - isNotNull:
          path: metadata.labels["app.kubernetes.io/name"]
      - isNotNull:
          path: metadata.labels["helm.sh/chart"]

  - it: should create root file keys with root-- prefix
    values:
      - values/workspace-root.yaml
    asserts:
      - isNotNull:
          path: data["root--AGENT.md"]

  - it: should create agent file keys with agent-- prefix
    values:
      - values/workspace-agent.yaml
    asserts:
      - isNotNull:
          path: data["agent--researcher--AGENT.md"]

  - it: should support multiple root files
    values:
      - values/workspace-multi-root.yaml
    asserts:
      - isNotNull:
          path: data["root--AGENT.md"]
      - isNotNull:
          path: data["root--SOUL.md"]

  - it: should support multiple agents with multiple files
    values:
      - values/workspace-multi-agent.yaml
    asserts:
      - isNotNull:
          path: data["agent--researcher--AGENT.md"]
      - isNotNull:
          path: data["agent--coder--AGENT.md"]

  - it: should support root and agent files together
    values:
      - values/workspace-combined.yaml
    asserts:
      - isNotNull:
          path: data["root--AGENT.md"]
      - isNotNull:
          path: data["agent--researcher--AGENT.md"]
