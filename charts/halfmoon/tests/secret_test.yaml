suite: Secret
templates:
  - templates/secret.yaml
values:
  - ../values.yaml
set:
  config.agents.defaults.model_name: "test-model"
tests:
  - it: should render a Secret by default
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: type
          value: Opaque

  - it: should contain .security.yml key
    asserts:
      - isNotNull:
          path: data[".security.yml"]

  - it: should not render when existingSecret is set
    set:
      credentials.existingSecret: my-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: should have standard labels
    asserts:
      - isNotNull:
          path: metadata.labels["app.kubernetes.io/name"]
      - isNotNull:
          path: metadata.labels["helm.sh/chart"]

  - it: should base64 encode security content
    set:
      credentials.security:
        model_list:
          test-model:
            api_keys:
              - "sk-test"
    asserts:
      - isNotNull:
          path: data[".security.yml"]
